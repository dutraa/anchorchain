name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build anchorchaind
        run: go build ./cmd/anchorchaind

      - name: Build anchor-cli
        run: go build ./cmd/anchor-cli
